<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    input { width: 300px; padding: 8px; }
    button { padding: 8px; }
    #chat-output { margin-top: 20px; }
    #chat-output p { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>Chat with AI</h1>
  <input type="text" id="user-input" placeholder="Ask something..." />
  <button onclick="sendMessage()">Send</button>
  <div id="chat-output"></div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value;
      if (!message) return;

      const chatOutput = document.getElementById('chat-output');
      chatOutput.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
      input.value = '';

      try {
        const response = await fetch('https://console.firebase.google.com/project/studio-7997856212-6057a/overview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        chatOutput.innerHTML += `<p><strong>AI:</strong> ${data.reply}</p>`;
      } catch (error) {
        chatOutput.innerHTML += `<p><strong>Error:</strong> ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
